<section class="device-page">
  <div class="page-heading">
    <title-label
      title="设备列表"
      description="管理 MQTT 接入设备、心跳状态、设备别名与坐标信息。"
    />
    <div class="page-actions">
      <button nz-button (click)="getData()">
        <i nz-icon nzType="reload"></i>
        刷新
      </button>
      @if (false) {
        <button nz-button nzType="primary" (click)="create()">
          <i nz-icon nzType="plus"></i>
          新建设备
        </button>
      }
    </div>
  </div>

  <nz-card class="list-card" [nzBordered]="false">
    <div class="filter-panel">
      <div class="filter-heading">
        <div>
          <strong>筛选设备</strong>
          <span>按设备号、别名与在线状态定位设备。</span>
        </div>
        <span class="result-chip">共 {{ total || 0 }} 条</span>
      </div>

      <div class="query-bar">
        <nz-input-wrapper class="search-input">
          <nz-icon nzInputPrefix nzType="search" />
          <input
            nz-input
            [(ngModel)]="q.content"
            placeholder="搜索设备号或别名"
            (keydown.enter)="search()"
          />
        </nz-input-wrapper>
        <div class="filter-controls">
          <nz-select [(ngModel)]="q.status" nzPlaceHolder="状态" (ngModelChange)="search()">
            <nz-option nzValue="" nzLabel="全部状态" />
            <nz-option nzValue="1" nzLabel="在线" />
            <nz-option nzValue="0" nzLabel="离线" />
          </nz-select>
        </div>
        <div class="filter-actions">
          <button nz-button nzType="primary" (click)="search()">
            <i nz-icon nzType="search"></i>
            搜索
          </button>
          <button nz-button (click)="resetQuery()">重置</button>
        </div>
      </div>
    </div>

    <st
      [data]="data"
      [columns]="columns"
      [loading]="loading"
      [pi]="q.page"
      [ps]="q.size"
      [total]="total"
      [page]="{ front: false, showSize: true, pageSizes: [10, 20, 50], showQuickJumper: true }"
      (change)="tableChange($event)"
    >
      <ng-template st-row="deviceRender" let-item>
        <div class="strong">{{ item.alias || item.sncode }}</div>
        <div class="muted mono">{{ item.sncode }}</div>
      </ng-template>

      <ng-template st-row="locationRender" let-item>
        <div class="mono">经度 {{ coordinateText(item.lng) }}</div>
        <div class="muted mono">
          纬度 {{ coordinateText(item.lat) }} · 高程 {{ altitudeText(item) }}
        </div>
      </ng-template>

      <ng-template st-row="typeRender">
        <span class="pill">北斗降雨</span>
      </ng-template>

      <ng-template st-row="statusRender" let-item>
        <span class="status" [class.status-off]="item.status !== 1">
          {{ statusLabel(item.status) }}
        </span>
      </ng-template>

      <ng-template st-row="heartbeatRender" let-item>
        {{ formatTime(item.last_time) }}
      </ng-template>

      <ng-template st-row="actionsRender" let-item>
        <div class="action-col">
          <button
            nz-button
            nzType="link"
            class="action-button"
            aria-label="编辑"
            (click)="edit(item)"
          >
            <i nz-icon nzType="edit"></i>
            <span>编辑</span>
          </button>
          <button
            nz-button
            nzType="link"
            class="action-button"
            aria-label="删除"
            nzDanger
            (click)="remove(item)"
          >
            <i nz-icon nzType="delete"></i>
            <span>删除</span>
          </button>
        </div>
      </ng-template>
    </st>
  </nz-card>
</section>
